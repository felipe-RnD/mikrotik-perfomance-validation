# Scenario 3 - Scaling iteration (MikroTik RouterOS - Standalone single-path)
# Output files use parser-expected naming: s3_scale_Xpath_*

- name: S3 ({{ path_count }} paths) - Display iteration start
  ansible.builtin.debug:
    msg:
      - ""
      - "═══════════════════════════════════════════════════════════════"
      - "  TESTING WITH {{ path_count }} WAN PATH(S)"
      - "═══════════════════════════════════════════════════════════════"
      - ""

# Standalone mode: single path, no WAN path switching needed on MikroTik

# Set parser-compatible file prefix (s3_scale_Xpath_*)
- name: S3 ({{ path_count }} path(s)) - Set iteration file prefix
  ansible.builtin.set_fact:
    s3_file_prefix: "{{ test_mode_results_dir }}/s3_scale_{{ path_count }}path"

# --------------------------------------------------------
# 1. Determine Performance Ceiling (Binary Search)
# --------------------------------------------------------
- name: S3 ({{ path_count }} path(s)) - Find Max Throughput (IMIX)
  ansible.builtin.include_role:
    name: 02_trex_control
    tasks_from: binary_search.yml
  vars:
    traffic_profile_name: "imix"
    binary_search_max_gbps: "{{ binary_search_max_imix_gbps }}"
    profile_client_ip: "{{ trex_ip }}"
    profile_server_ip: "{{ app_server_ip }}"
    profile_gateway_ip: "{{ dut_trex_lan_ip }}"

- name: S3 ({{ path_count }} paths) - Store discovered max rate
  ansible.builtin.set_fact:
    discovered_max_rate: "{{ gbps | default(0) }}"

- name: S3 ({{ path_count }} paths) - Calculate 70% background load
  ansible.builtin.set_fact:
    background_load_gbps: "{{ (discovered_max_rate | float * scaling_test_load_factor) | round(2) }}"

- name: S3 ({{ path_count }} paths) - Display load calculation
  ansible.builtin.debug:
    msg:
      - "Max Rate Discovered: {{ discovered_max_rate }} Gbps"
      - "Background Load (70%): {{ background_load_gbps }} Gbps"

- name: S3 ({{ path_count }} paths) - Pause before starting background load
  ansible.builtin.pause:
    seconds: 5

# --------------------------------------------------------
# 2. Start Monitoring & Background Load (Async)
# --------------------------------------------------------
- name: S3 ({{ path_count }} paths) - Start DUT monitoring (background)
  ansible.builtin.shell: |
    ansible-playbook -i {{ playbook_dir }}/../../inventory/hosts.yml \
    {{ playbook_dir }}/../utils/run_monitoring.yml \
    -e "monitor_duration_sec={{ scaling_test_duration }}" \
    -e "monitor_interval_sec=30" \
    -e "monitor_start_delay_sec=28" \
    -e "monitor_output_file={{ s3_file_prefix }}_dut_monitor.log" \
    -e "ansible_host={{ dut_ansible_host }}" \
    -e "ansible_user={{ dut_ansible_user }}" \
    -e "ansible_ssh_pass={{ dut_ansible_ssh_pass }}" \
    -e "dut_wan_trunk={{ dut_interface_map.wan_trunk }}" \
    -e "dut_lan_trex={{ dut_interface_map.lan_trex }}"
  args:
    chdir: /home/scadmin/mikrotik-perfomance-validation
  async: "{{ scaling_test_duration | int + 120 }}"
  poll: 0
  register: dut_monitor
  become: false

- name: S3 ({{ path_count }} paths) - Start 70% Background Load (T-Rex)
  ansible.builtin.shell: |
    ansible-playbook -i {{ playbook_dir }}/../../inventory/hosts.yml \
    {{ playbook_dir }}/../utils/run_trex_load.yml \
      -e "traffic_profile_name=imix" \
      -e "duration={{ scaling_test_duration }}" \
      -e "rate_gbps={{ background_load_gbps }}" \
      -e "profile_client_ip={{ trex_ip }}" \
      -e "profile_server_ip={{ app_server_ip }}" \
      -e "profile_gateway_ip={{ dut_trex_lan_ip }}" \
      -e "results_file_name={{ s3_file_prefix }}_trex_70pct.log"
  args:
    chdir: /home/scadmin/mikrotik-perfomance-validation
  async: "{{ scaling_test_duration | int + 60 }}"
  poll: 0
  register: trex_bg_load
  become: false

- name: S3 ({{ path_count }} paths) - Wait for T-Rex to stabilize
  ansible.builtin.pause:
    seconds: 10

# --------------------------------------------------------
# 3. Run Application Tests (Concurrent with Load)
# --------------------------------------------------------
- name: S3 ({{ path_count }} paths) - Run K6 App Suite (HTTP)
  ansible.builtin.include_role:
    name: 05_k6_control
    tasks_from: run_test.yml
  vars:
    k6_vus: "{{ k6_vus_http | default(10) }}"
    k6_duration: "{{ test_duration_k6_sec }}s"
    k6_target_url: "http://{{ app_server_ip }}/"
    k6_test_profile: "http_transaction"
    results_file_name: "{{ s3_file_prefix }}_k6_http.json"

- name: S3 ({{ path_count }} paths) - Run K6 App Suite (DB)
  ansible.builtin.include_role:
    name: 05_k6_control
    tasks_from: run_test.yml
  vars:
    k6_vus: "{{ k6_vus_db | default(5) }}"
    k6_duration: "{{ test_duration_k6_sec }}s"
    k6_target_url: "{{ k6_target_endpoint_db }}"
    k6_test_profile: "db_transaction"
    results_file_name: "{{ s3_file_prefix }}_k6_db.json"

# --------------------------------------------------------
# 4. Cleanup & Save
# --------------------------------------------------------
- name: S3 ({{ path_count }} paths) - Wait for T-Rex completion
  ansible.builtin.async_status:
    jid: "{{ trex_bg_load.ansible_job_id }}"
  register: trex_job_result
  until: trex_job_result.finished
  retries: 30
  delay: 10
  become: false

- name: S3 ({{ path_count }} paths) - Wait for Monitoring completion
  ansible.builtin.async_status:
    jid: "{{ dut_monitor.ansible_job_id }}"
  register: dut_monitor_result
  until: dut_monitor_result.finished
  retries: 30
  delay: 10
  become: false

- name: S3 ({{ path_count }} paths) - Save iteration summary
  ansible.builtin.copy:
    content: |
      {
        "scenario": "03_scaling_and_quality",
        "test_mode": "{{ test_mode }}",
        "path_count": {{ path_count }},
        "max_rate_gbps": {{ discovered_max_rate }},
        "background_load_gbps": {{ background_load_gbps }},
        "test_duration_sec": {{ scaling_test_duration }},
        "dut_monitoring_log": "s3_scale_{{ path_count }}path_dut_monitor.log",
        "timestamp": "{{ ansible_date_time.iso8601 }}"
      }
    dest: "{{ s3_file_prefix }}_summary.json"
    mode: '0644'

- name: S3 ({{ path_count }} paths) - Pause between iterations
  ansible.builtin.pause:
    seconds: 10
