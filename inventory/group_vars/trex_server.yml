# -----------------------------------------------------------------
# T-Rex Server Variables
# -----------------------------------------------------------------
# This file contains variables specific to the T-Rex Traffic
# Generator. These settings are automatically loaded for hosts
# in the trex_server inventory group.
# -----------------------------------------------------------------

# -----------------------------------------------------------------
# SSH Connection Settings
# -----------------------------------------------------------------

ansible_user: "{{ lab_ssh_user }}"
ansible_ssh_private_key_file: ~/.ssh/lab_key
#ansible_ssh_pass: "{{ lab_ssh_pass }}"
ansible_become: yes  # Enable privilege escalation (sudo)

# -----------------------------------------------------------------
# Installation and Configuration Paths
# -----------------------------------------------------------------
# Reference: Configuration Guide.md - T-Rex Traffic Generator Setup
# -----------------------------------------------------------------

trex_install_dir: "/opt/trex"             # T-Rex installation directory
trex_config_file: "/etc/trex/trex_cfg.yaml"    # T-Rex configuration file

# -----------------------------------------------------------------
# Binary Search Parameters
# -----------------------------------------------------------------
# Reference: Test Plan Section 8.1 - Binary Search Algorithm
# These parameters control the throughput discovery process.
# -----------------------------------------------------------------

# Binary Search Parameters (Global defaults)
binary_search_min_gbps: 0.01
binary_search_duration_sec: 60
binary_search_loss_pct: 0.00242            # ITU-T Y.1564 standard for "Service Activation Testing" +0.1% for baseline noise
binary_search_resolution_gbps: 0.001

# Packet-size-specific max rates (based on DUT pps limitations)
binary_search_max_gbps: 10.000           # For baseline test
binary_search_max_64b_gbps: 0.300        # 64-byte ceiling (~300 Mbps)
binary_search_max_512b_gbps: 1.000       # 512-byte ceiling (~500 Mbps)
bbinary_search_max_large_gbps: 3.000      # 1360-byte ceiling (~1 Gbps)
binary_search_max_imix_gbps: 2.000       # IMIX ceiling (~800 Mbps)

# Test Scenario Parameters
scaling_test_load_factor: 0.7           # 70% of max throughput for background load
scaling_test_duration: 120              # Duration in seconds for sustained load test
stability_test_duration: 1800            # Duration for stability test in seconds, or "xh" for hours
stability_test_load_factor: 0.8         # 80% of max throughput for stability test

# -----------------------------------------------------------------
# Reporting & Validation Thresholds
# -----------------------------------------------------------------
# Calculated by Scenario 01b (Noise Baseline).
# This acts as the Single Source of Truth for "Pass/Fail" in reports.
# -----------------------------------------------------------------

validation_loss_pct: 0.336  # Update this based on S01b results

# Max acceptable packet loss % for Scaling (S03) - typically looser
scaling_loss_threshold_pct: 0.5
