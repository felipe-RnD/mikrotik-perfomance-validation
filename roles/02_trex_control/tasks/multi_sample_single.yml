# =============================================================================
# Single Sample Measurement (called by multi_sample_measure.yml)
# =============================================================================
# Uses expect scripts consistent with the main binary search approach
# =============================================================================

- name: "Sample {{ sample_num }}/{{ _sample_count }} - Create expect script"
  ansible.builtin.copy:
    dest: "/tmp/trex_sample_{{ sample_num }}.exp"
    content: |
      #!/usr/bin/expect -f
      set timeout {{ (_sample_duration | int) + 30 }}
      log_user 1

      cd {{ trex_install_dir }}
      spawn ./trex-console

      expect {
        "trex>" {}
        timeout { puts "TIMEOUT waiting for prompt"; exit 1 }
      }

      # Reset ports
      send "reset\r"
      expect {
        "trex>" {}
        timeout { puts "TIMEOUT after reset"; exit 1 }
      }

      # Enable promiscuous mode
      send "portattr -a --prom on\r"
      expect {
        "trex>" {}
        timeout { puts "TIMEOUT after portattr"; exit 1 }
      }

      # Start traffic
      puts "Sample {{ sample_num }}: Starting at {{ sample_rate_gbps }} Gbps for {{ _sample_duration }}s..."
      send "start -f {{ trex_install_dir }}/{{ traffic_profile_name }}.py -m {{ sample_rate_gbps }}gbps {{ profile_flags }} --force\r"
      expect {
        "trex>" {}
        timeout { puts "TIMEOUT after start"; exit 1 }
      }

      # Wait for sample duration
      sleep {{ _sample_duration }}

      # Stop and get stats
      send "stop\r"
      expect {
        "trex>" {}
        timeout { puts "TIMEOUT after stop"; exit 1 }
      }

      send "stats -a\r"
      expect {
        "trex>" {}
        timeout { puts "TIMEOUT after stats"; exit 1 }
      }

      # Release and quit
      send "release\r"
      sleep 1
      send "quit\r"
      expect eof
    mode: '0755'
  delegate_to: "{{ groups['trex_server'][0] }}"

- name: "Sample {{ sample_num }}/{{ _sample_count }} - Execute traffic"
  ansible.builtin.shell: |
    /usr/bin/expect /tmp/trex_sample_{{ sample_num }}.exp
  args:
    executable: /bin/bash
    chdir: "{{ trex_install_dir }}"
  delegate_to: "{{ groups['trex_server'][0] }}"
  register: sample_output
  ignore_errors: yes

- name: "Sample {{ sample_num }}/{{ _sample_count }} - Parse results"
  vars:
    stdout_text: "{{ sample_output.stdout | default('') }}"
    opackets_match: "{{ stdout_text | regex_search('opackets\\s+\\|\\s+(\\d+)', '\\1') }}"
    ipackets_match: "{{ stdout_text | regex_search('ipackets\\s+\\|\\s+(\\d+)', '\\1') }}"
  ansible.builtin.set_fact:
    _sample_opackets: "{{ opackets_match[0] | default('0') | int }}"
    _sample_ipackets: "{{ ipackets_match[0] | default('0') | int }}"

- name: "Sample {{ sample_num }}/{{ _sample_count }} - Calculate and store loss"
  vars:
    loss_pct: "{{ (((_sample_opackets | int) - (_sample_ipackets | int)) / (_sample_opackets | int) * 100) if (_sample_opackets | int) > 0 else 100.0 }}"
  ansible.builtin.set_fact:
    sample_losses: "{{ sample_losses + [loss_pct | float | round(4)] }}"
    sample_opackets_list: "{{ sample_opackets_list + [_sample_opackets | string] }}"
    sample_ipackets_list: "{{ sample_ipackets_list + [_sample_ipackets | string] }}"

- name: "Sample {{ sample_num }}/{{ _sample_count }} - Display result"
  ansible.builtin.debug:
    msg: "Sample {{ sample_num }}: Loss = {{ sample_losses[-1] }}%"

- name: "Sample {{ sample_num }}/{{ _sample_count }} - Cleanup expect script"
  ansible.builtin.file:
    path: "/tmp/trex_sample_{{ sample_num }}.exp"
    state: absent
  delegate_to: "{{ groups['trex_server'][0] }}"
  ignore_errors: yes

- name: "Sample {{ sample_num }}/{{ _sample_count }} - Brief pause between samples"
  ansible.builtin.pause:
    seconds: "{{ _sample_pause | default(5) }}"
  when: sample_num | int < (_sample_count | int)
