- name: MONITOR - Validate monitoring parameters
  ansible.builtin.assert:
    that:
      - monitor_duration_sec is defined
      - monitor_interval_sec is defined
      - monitor_output_file is defined
      - ansible_host is defined
      - ansible_user is defined
      - ansible_ssh_pass is defined
    fail_msg: "Required variables: monitor_duration_sec, monitor_interval_sec, monitor_output_file, ansible_host, ansible_user, ansible_ssh_pass"

- name: MONITOR - Calculate iterations
  ansible.builtin.set_fact:
    monitor_iterations: "{{ (monitor_duration_sec | int / monitor_interval_sec | int) | int }}"

- name: MONITOR - Generate persistent Expect script (MikroTik)
  ansible.builtin.copy:
    dest: "/tmp/persistent_monitor_dut.exp"
    mode: '0755'
    content: |
      #!/usr/bin/expect -f
      set timeout -1
      log_user 1

      # 1. Establish Connection (MANDATORY SPACE FIX)
      spawn ssh -o StrictHostKeyChecking=no -i ~/.ssh/lab_key {{ ansible_user }}@{{ ansible_host }}
      expect {
        "password:" { send "{{ ansible_ssh_pass }}\r"; exp_continue }
        "(yes/no)" { send "yes\r"; exp_continue }
        " > " { }
        timeout { puts "ERROR: SSH connection timed out"; exit 1 }
        eof { puts "ERROR: SSH connection closed unexpectedly"; exit 1 }
      }
      set max_iter {{ monitor_iterations }}

      # 2. Initial Delay (Avoid Test Ramp-up)
      {% if monitor_start_delay_sec | default(0) | int > 0 %}
      sleep {{ monitor_start_delay_sec }}
      {% endif %}

      # 3. Monitoring Loop
      set max_iter {{ monitor_iterations }}

      for {set i 1} {$i <= $max_iter} {incr i} {

          # Print Header for Log parsing
          puts "\n================================================================================"
          puts "Iteration $i/$max_iter - [clock format [clock seconds] -format \"%Y-%m-%dT%H:%M:%S\"]"
          puts "================================================================================"

          # Resource usage
          send "/system resource print\r"
          expect " > "

          # Interface Statistics
          # Uses the variables passed from the previous playbook call
          send "/interface print stats where name={{ dut_lan_trex }} or name={{ dut_wan_trunk }}\r"
          expect " > "

          # Session Tracking (Critical for Scenario 4)
          send "/ip firewall connection print count-only\r"
          expect " > "

          # Hardware Health
          send "/system health print\r"
          expect " > "

          if {$i < $max_iter} {
              sleep {{ monitor_interval_sec }}
          }
      }

      # 4. Clean Exit
      send "/quit\r"
      expect eof
  delegate_to: localhost
  become: false

- name: MONITOR - Execute persistent monitoring
  ansible.builtin.shell: |
    /tmp/persistent_monitor_dut.exp > {{ monitor_output_file }} 2>&1
  register: monitor_result
  delegate_to: localhost
  become: false

- name: MONITOR - Verify log file was created
  ansible.builtin.stat:
    path: "{{ monitor_output_file }}"
  register: monitor_log_stat
  delegate_to: localhost

- name: MONITOR - Report monitoring status
  ansible.builtin.debug:
    msg: >-
      Monitor log {{ 'created successfully' if monitor_log_stat.stat.exists and monitor_log_stat.stat.size > 0
      else 'FAILED - check /tmp/persistent_monitor_dut.exp and SSH connectivity to ' + ansible_host }}